<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>卡貝庫存查詢</title>
<style>
*{box-sizing:border-box}
body{
  margin:0;
  min-height:100vh;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans TC","Microsoft JhengHei",Arial,sans-serif;
  background:
    radial-gradient(circle at 12% 0%, rgba(54,232,154,.12), transparent 28%),
    radial-gradient(circle at 88% 12%, rgba(139,31,31,.18), transparent 26%),
    linear-gradient(180deg,#090d12 0%,#0f141c 48%,#080b10 100%);
  color:#edf2f7;
}
.wrap{max-width:980px;margin:0 auto;padding:34px 18px}
.header{border-bottom:1px solid rgba(126,240,182,.28);padding-bottom:18px;margin-bottom:22px}
h1{margin:0 0 8px;font-size:30px;letter-spacing:1px}
.sub{color:#9aa8ba;font-size:15px;line-height:1.7}
.grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:16px}
.card{
  background:linear-gradient(180deg,#172130,#111923);
  border:1px solid rgba(126,240,182,.22);
  border-radius:20px;
  padding:22px 20px;
  min-height:130px;
  box-shadow:0 18px 38px rgba(0,0,0,.36);
}
.name{color:#9cc8e8;font-size:18px;margin-bottom:14px;font-weight:800}
.value{font-size:38px;line-height:1;font-weight:1000;letter-spacing:.5px;color:#fff}
.status{
  margin-top:22px;
  padding:14px 16px;
  border-left:5px solid #38c788;
  background:#1d2634;
  color:#d8e0ea;
  border-radius:12px;
  line-height:1.7;
}
.bad{border-left-color:#e0524d;background:#351d22;color:#ffd7d7}
.actions{display:flex;gap:10px;flex-wrap:wrap;margin-top:18px}
button{
  border:0;
  border-radius:12px;
  padding:12px 16px;
  background:linear-gradient(180deg,#2fcf87,#1f9f67);
  color:#fff;
  cursor:pointer;
  font-size:16px;
  font-weight:900;
}
.note{margin-top:18px;color:#8493a6;font-size:13px;line-height:1.7}
@media(max-width:760px){
  .grid{grid-template-columns:1fr}
  h1{font-size:25px}
  .value{font-size:34px}
}
</style>
</head>
<body>
<div class="wrap">
  <div class="header">
    <h1>卡貝庫存查詢</h1>
    <div class="sub">即時顯示目前可售庫存，不顯示成本、利潤、客人備註與交易紀錄。</div>
  </div>

  <div class="grid">
    <div class="card">
      <div class="name">剩餘點數</div>
      <div class="value" id="points">--</div>
    </div>
    <div class="card">
      <div class="name">剩餘箱子</div>
      <div class="value" id="boxes">--</div>
    </div>
    <div class="card">
      <div class="name">剩餘轉移</div>
      <div class="value" id="transfers">--</div>
    </div>
  </div>

  <div id="status" class="status">正在讀取庫存...</div>

  <div class="actions">
    <button onclick="loadStock()">重新整理</button>
  </div>

  <div class="note">頁面會每 60 秒自動更新一次。若剛新增交易，請等待主系統同步完成後再重新整理。</div>
</div>

<script>
const STOCK_API_URL = "https://script.google.com/macros/s/AKfycby5rx43sCVazqJJb2zaawNdcBdL9dlHU2OhZSZ4TjSjPrloxrgJYzBJdRp46HM6XecTrA/exec";

function fmt(v){
  return Number(v || 0).toLocaleString("zh-TW", {maximumFractionDigits:0});
}

function esc(s){
  return String(s ?? "").replace(/[&<>\"']/g, function(m){
    return {"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#039;"}[m];
  });
}

function setStatus(msg, bad=false){
  const el = document.getElementById("status");
  el.className = "status" + (bad ? " bad" : "");
  el.innerHTML = msg;
}

function loadStock(){
  if(!STOCK_API_URL || STOCK_API_URL.indexOf("script.google.com") === -1){
    setStatus("尚未設定 Apps Script /exec 網址。", true);
    return;
  }

  const cb = "stockCallback_" + Date.now() + "_" + Math.random().toString(16).slice(2);
  const script = document.createElement("script");

  window[cb] = function(res){
    try{
      if(!res || res.status !== "ok"){
        throw new Error((res && res.message) || "讀取失敗");
      }

      document.getElementById("points").textContent = fmt(res.points);
      document.getElementById("boxes").textContent = fmt(res.boxes);
      document.getElementById("transfers").textContent = fmt(res.transfers);

      setStatus("庫存已更新<br>最後同步時間：" + esc(res.updatedAt || "未提供"));
    }catch(err){
      setStatus("讀取失敗：" + esc(err.message || err), true);
    }finally{
      try{
        delete window[cb];
        script.remove();
      }catch(e){}
    }
  };

  script.onerror = function(){
    setStatus("讀取失敗：請檢查 Apps Script 網址、部署權限，或 Code.gs 是否已加入 action=stock。", true);
    try{
      delete window[cb];
      script.remove();
    }catch(e){}
  };

  setStatus("正在讀取庫存...");
  script.src = STOCK_API_URL + "?action=stock&callback=" + encodeURIComponent(cb) + "&_=" + Date.now();
  document.body.appendChild(script);
}

loadStock();
setInterval(loadStock, 60000);
</script>
</body>
</html>
